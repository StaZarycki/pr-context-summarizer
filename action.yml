name: 'PR Synth (Jira + PR summary)'
description: 'Summarize PR with business context from Jira + technical highlights'
inputs:
  jiraBaseUrl: { required: true }
  jiraEmail: { required: true }
  jiraApiToken: { required: true }
  githubToken: { required: false }
  openaiApiKey:
    {
      description: 'OpenAI API key (optional). If set, AI writes the summary; heuristics are a fallback.',
      required: false,
    }
  openaiModel:
    { description: 'Model name', required: false, default: 'gpt-4o-mini' }
  dryRun:
    {
      description: 'If true, do not post a PR comment; just write to job summary',
      required: false,
      default: 'false',
    }
  issueKeyPattern: { required: false, default: "(?<key>[A-Z]{2,}-\\d+)" }
  maxFiles: { required: false, default: '200' }
  maxDiffBytes: { required: false, default: '350000' }
  updateExistingComment: { required: false, default: 'true' }

runs:
  using: 'node24'
  main: 'dist/index.js'
